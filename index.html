<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f1a">
    <title>Samuel Jarai | Full-Stack Software Engineer</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Portfolio of Samuel Jarai, a Full-Stack Software Engineer specializing in Python, Django, Vue.js, and Cloud Technologies. View projects, skills, and certifications.">
    <meta name="keywords" content="Samuel Jarai, Software Engineer, Full Stack Developer, Python, Django, Vue.js, React, AWS, Cloud, Portfolio">
    <meta name="author" content="Samuel Jarai">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jaggerjack61.github.io/portfolio/">
    <meta property="og:title" content="Samuel Jarai | Full-Stack Software Engineer">
    <meta property="og:description" content="Portfolio of Samuel Jarai, a Full-Stack Software Engineer specializing in Python, Django, Vue.js, and Cloud Technologies.">
    <meta property="og:image" content="https://jaggerjack61.github.io/portfolio/images/profile_pic.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://jaggerjack61.github.io/portfolio/">
    <meta property="twitter:title" content="Samuel Jarai | Full-Stack Software Engineer">
    <meta property="twitter:description" content="Portfolio of Samuel Jarai, a Full-Stack Software Engineer specializing in Python, Django, Vue.js, and Cloud Technologies.">
    <meta property="twitter:image" content="https://jaggerjack61.github.io/portfolio/images/profile_pic.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Samuel Jarai",
        "url": "https://jaggerjack61.github.io/portfolio/",
        "image": "https://jaggerjack61.github.io/portfolio/images/profile_pic.png",
        "sameAs": [
          "https://github.com/jaggerjack61",
          "https://linkedin.com/in/samuel-jarai"
        ],
        "jobTitle": "Full-Stack Software Engineer",
        "worksFor": {
          "@type": "Organization",
          "name": "Freelance"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Harare",
          "addressCountry": "Zimbabwe"
        }
      }
    </script>

    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
